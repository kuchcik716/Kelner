<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMÓWIENIA KELNERSKIE V16</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* STOLIKI */
.tables {
    display: flex;
    overflow-x: auto;
    background: #000;
    padding: 5px;
}

.table-btn {
    margin: 5px;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: #333;
    color: white;
    font-size: 14px;
}

.table-active {
    background: orange;
    color: black;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #222;
}

.button {
    padding: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 110px);
}

.column {
    flex: 1;
    padding: 10px;
}

.food {
    background: #0b3d91;
}

.drinks {
    background: #5a0b91;
}

/* ITEM */
.item {
    background: #222;
    margin: 10px 0;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
    display: flex;
    justify-content: space-between;
}

.controls button {
    margin-left: 5px;
    font-size: 18px;
}

/* PODSUMOWANIE */
.summary-screen {
    display: none;
    padding: 20px;
}

.summary-item {
    font-size: 22px;
    margin: 10px 0;
}
</style>
</head>

<body>

<!-- STOLIKI -->
<div class="tables" id="tables"></div>

<!-- HEADER -->
<div class="header">
    <h2 id="tableTitle">STÓŁ 1</h2>
    <button class="button" onclick="showSummary()">PODSUMOWANIE</button>
</div>

<!-- GŁÓWNY EKRAN -->
<div class="container" id="mainScreen">

    <div class="column food">
        <h3>JEDZENIE</h3>
        <div id="foodList"></div>
    </div>

    <div class="column drinks">
        <h3>NAPOJE</h3>
        <div id="drinkList"></div>
    </div>

</div>

<!-- PODSUMOWANIE -->
<div class="summary-screen" id="summaryScreen">
    <h2>PODSUMOWANIE</h2>
    <div id="summaryList"></div>
    <button class="button" onclick="backToMain()">WRÓĆ</button>
</div>

<script>
const foodItems = [
"KREWETKI", "ROSÓŁ", "ZUPA DNIA", "BRUNETA",
"ŁOSOŚ", "PSTRĄG", "SCHAB", "GULASZ",
"RISOTTO", "MANGO KREWETKI",
"FONDANT", "LODY", "DESER"
];

const drinkItems = [
"KAWA CZARNA", "LATTE", "AFOGATO", "PROSECCO"
];

let currentTable = 1;
let orders = {};

// inicjalizacja stolików
function initTables() {
    const container = document.getElementById("tables");
    for (let i = 1; i <= 10; i++) {
        const btn = document.createElement("button");
        btn.innerText = "T" + i;
        btn.className = "table-btn";
        btn.onclick = () => switchTable(i);
        container.appendChild(btn);
    }
    updateActiveTable();
}

function switchTable(nr) {
    currentTable = nr;
    if (!orders[currentTable]) {
        orders[currentTable] = {};
    }
    updateActiveTable();
    render();
}

function updateActiveTable() {
    document.getElementById("tableTitle").innerText = "STÓŁ " + currentTable;
    const buttons = document.querySelectorAll(".table-btn");
    buttons.forEach((b, i) => {
        b.classList.toggle("table-active", i === currentTable - 1);
    });
}

// dodawanie / odejmowanie
function changeItem(name, delta) {
    if (!orders[currentTable]) orders[currentTable] = {};
    if (!orders[currentTable][name]) orders[currentTable][name] = 0;

    orders[currentTable][name] += delta;

    if (orders[currentTable][name] <= 0) {
        delete orders[currentTable][name];
    }

    render();
}

// render list
function render() {
    renderList("foodList", foodItems);
    renderList("drinkList", drinkItems);
}

function renderList(id, items) {
    const container = document.getElementById(id);
    container.innerHTML = "";

    items.forEach(item => {
        const count = orders[currentTable]?.[item] || 0;

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
            <span>${item}</span>
            <div class="controls">
                <button onclick="changeItem('${item}', -1)">-</button>
                ${count}
                <button onclick="changeItem('${item}', 1)">+</button>
            </div>
        `;
        container.appendChild(div);
    });
}

// PODSUMOWANIE
function showSummary() {
    document.getElementById("mainScreen").style.display = "none";
    document.getElementById("summaryScreen").style.display = "block";

    const list = document.getElementById("summaryList");
    list.innerHTML = "";

    const tableOrder = orders[currentTable] || {};

    for (let item in tableOrder) {
        const div = document.createElement("div");
        div.className = "summary-item";
        div.innerText = tableOrder[item] + "x " + item;
        list.appendChild(div);
    }
}

function backToMain() {
    document.getElementById("summaryScreen").style.display = "none";
    document.getElementById("mainScreen").style.display = "flex";
}

// start
initTables();
switchTable(1);
</script>

</body>
</html>
