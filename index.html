<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zamówienia kelnerskie V15</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f1f5f9;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr 0.8fr;
  gap: 10px;
  padding: 10px;
}

.panel {
  background: white;
  border-radius: 20px;
  padding: 10px;
}

.title {
  font-size: 26px;
  font-weight: 900;
  margin-bottom: 10px;
}

.food { color: blue; }
.drink { color: purple; }

.item {
  border: 2px solid #ddd;
  border-radius: 15px;
  padding: 10px;
  margin-bottom: 8px;
}

.name {
  font-size: 22px;
  font-weight: 900;
}

.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

button {
  width: 60px;
  height: 60px;
  font-size: 26px;
  font-weight: 900;
  border-radius: 12px;
  border: none;
}

.plus.food { background: blue; color: white; }
.plus.drink { background: purple; color: white; }
.minus { background: #eee; }

.qty {
  font-size: 28px;
  font-weight: 900;
}

.summary-item {
  border-bottom: 2px solid #eee;
  padding: 5px 0;
}

</style>
</head>

<body>

<div class="container">

  <div class="panel">
    <div class="title food">JEDZENIE</div>
    <div id="food"></div>
  </div>

  <div class="panel">
    <div class="title drink">NAPOJE</div>
    <div id="drink"></div>
  </div>

  <div class="panel">
    <div class="title">PODSUMOWANIE</div>
    <div id="summary"></div>
    <button onclick="clearAll()">WYCZYŚĆ</button>
  </div>

</div>

<script>

const FOOD = [
  "KREWETKI NA MAŚLE",
  "ZUPA ROSÓŁ",
  "ZUPA DNIA",
  "ŁOSOŚ",
  "SCHAB",
  "RISOTTO"
];

const DRINK = [
  "KAWA CZARNA",
  "LATTE",
  "PROSECCO"
];

let order = {};

function addItem(name, type) {
  order[name] = (order[name] || 0) + 1;
  render();
}

function removeItem(name) {
  if (!order[name]) return;
  order[name]--;
  if (order[name] <= 0) delete order[name];
  render();
}

function clearAll() {
  order = {};
  render();
}

function renderMenu(list, container, type) {
  container.innerHTML = "";
  list.forEach(name => {
    const qty = order[name] || 0;

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="name">${name}</div>
      <div class="controls">
        <button class="minus" onclick="removeItem('${name}')">-</button>
        <div class="qty">${qty}</div>
        <button class="plus ${type}" onclick="addItem('${name}','${type}')">+</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function renderSummary() {
  const s = document.getElementById("summary");
  s.innerHTML = "";

  Object.keys(order).forEach(name => {
    const div = document.createElement("div");
    div.className = "summary-item";
    div.innerText = name + " x" + order[name];
    s.appendChild(div);
  });
}

function render() {
  renderMenu(FOOD, document.getElementById("food"), "food");
  renderMenu(DRINK, document.getElementById("drink"), "drink");
  renderSummary();
}

render();

</script>

</body>
</html>
