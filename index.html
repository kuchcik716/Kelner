<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMÓWIENIA KELNERSKIE V16</title>

<style>
body { margin:0; font-family:Arial; background:#f1f1f1; }
.app { max-width:1100px; margin:auto; padding:10px; }
.header { text-align:center; font-size:26px; font-weight:700; margin-bottom:10px; }

/* STOLIKI */
.tables { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:12px; }
.table-btn {
  padding:14px;
  font-size:18px;
  font-weight:700;
  border:2px solid #111;
  background:#ddd;
  cursor:pointer;
}
.table-btn.active { background:#2d79d8; color:#fff; }

/* RESZTA */
.columns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.box { background:#fff; border:2px solid #222; padding:10px; }
.btn { width:100%; padding:14px; font-size:20px; font-weight:700; margin-top:10px; cursor:pointer; border:2px solid #111; }
.send { background:#2e7d32; color:#fff; }
.clear { background:#58606b; color:#fff; }
.item { border-bottom:1px solid #ccc; padding:6px; font-weight:700; }
</style>
</head>

<body>
<div class="app">
<div class="header">ZAMÓWIENIA KELNERSKIE V16</div>

<!-- STOLIKI -->
<div class="tables" id="tables"></div>

<div class="columns">
  <div class="box">
    <div>JEDZENIE</div>
    <div id="food"></div>
    <button class="btn clear" onclick="clearFood()">WYCZYŚĆ</button>
  </div>

  <div class="box">
    <div>BAR</div>
    <div id="drink"></div>
    <button class="btn send" onclick="sendBar()">WYŚLIJ BAR</button>
    <button class="btn clear" onclick="clearDrink()">WYCZYŚĆ</button>
  </div>
</div>

</div>

<script>

/* 10 STOLIKÓW */
let tables = {};
for(let i=1;i<=10;i++){
  tables[i] = { food:[], drink:[] };
}

let currentTable = 1;

/* RENDER STOLIKÓW */
function renderTables(){
  const box = document.getElementById("tables");
  box.innerHTML = "";
  for(let i=1;i<=10;i++){
    box.innerHTML += `
      <div class="table-btn ${i===currentTable?'active':''}"
           onclick="switchTable(${i})">${i}</div>
    `;
  }
}

/* ZMIANA STOLIKA */
function switchTable(n){
  currentTable = n;
  renderTables();
  render();
}

/* DODAWANIE */
function addFood(name){
  tables[currentTable].food.push(name);
  render();
}

function addDrink(name){
  tables[currentTable].drink.push(name);
  render();
}

/* CZYSZCZENIE */
function clearFood(){
  tables[currentTable].food = [];
  render();
}

function clearDrink(){
  tables[currentTable].drink = [];
  render();
}

/* WYSYŁKA BAR */
function sendBar(){
  if(tables[currentTable].drink.length===0){
    alert("BRAK NAPOJÓW");
    return;
  }

  console.log("STOLIK:", currentTable, tables[currentTable].drink);

  alert("WYSŁANO BAR STOLIK " + currentTable);

  tables[currentTable].drink = [];
  render();
}

/* RENDER LIST */
function render(){
  document.getElementById("food").innerHTML =
    tables[currentTable].food.map(i=>`<div class="item">${i}</div>`).join("") || "BRAK";

  document.getElementById("drink").innerHTML =
    tables[currentTable].drink.map(i=>`<div class="item">${i}</div>`).join("") || "BRAK";
}

/* INIT */
renderTables();
render();

/* TEST (możesz usunąć) */
addFood("ŁOSOŚ");
addDrink("COCA COLA");

</script>

</body>
</html>
